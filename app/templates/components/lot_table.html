<h3>Lots</h3>
<table>
  <thead><tr><th>Date</th><th>Qty</th><th>Buy price</th><th>Fees</th><th>Notes</th><th>Actions</th></tr></thead>
  <tbody>
  {% for lot in lots %}
    <tr>
      <td>{{lot.buy_date}}</td><td>{{lot.quantity}}</td><td>{{lot.buy_price}}</td><td>{{lot.fees}}</td><td>{{lot.notes or ''}}</td>
      <td>
        <a href="/lots/{{lot.id}}/edit">Edit</a>
        <form method="post" action="/lots/{{lot.id}}/delete" style="display:inline">
          <input name="confirm" placeholder="DELETE" style="width:70px" />
          <button type="submit">Delete</button>
        </form>
      </td>
    </tr>
  {% endfor %}
  </tbody>
</table>
