{% extends 'base.html' %}
{% block content %}
<h2>Add Asset</h2>
<form method="post" action="/assets" class="card">
<input name="display_name" placeholder="Display name" required />
<select name="asset_type">{% for t in asset_types %}<option value="{{t.value}}">{{t.value}}</option>{% endfor %}</select>
<select name="asset_mode">{% for m in asset_modes %}<option value="{{m.value}}">{{m.value}}</option>{% endfor %}</select>
<input name="quote_currency" placeholder="Quote currency" required />
<input name="exchange" placeholder="Exchange" />
<input name="isin" placeholder="ISIN (for funds)" />
<input name="current_amount" placeholder="Cash amount (cash mode/type)" />
<input name="principal_amount" placeholder="Term deposit principal" />
<input name="interest_rate_annual" placeholder="Term deposit annual rate (e.g. 0.05)" />
<input name="start_date" placeholder="Term deposit start date YYYY-MM-DD" />
<input name="maturity_date" placeholder="Term deposit maturity date YYYY-MM-DD" />
<button type="submit">Create</button>
</form>
{% endblock %}
