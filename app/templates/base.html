<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Portfolio Outlook Manager</title>
  <link rel="stylesheet" href="/static/css/app.css" />
</head>
<body>
<header class="topbar"><h1>Portfolio Outlook Manager</h1><nav><a href="/">Portfolio</a><a href="/watchlist">Watchlist</a><a href="/assets/new">Add Asset</a><a href="/lots/new">Add Lot</a><a href="/alerts">Alerts <span id="alert-badge">0</span></a><a href="/alerts/rules">Alert Rules</a><a href="/imports/csv">Import/Export</a><a href="/settings">Settings</a><a href="/status">Status</a></nav></header>
<main>{% block content %}{% endblock %}</main>
<script src="/static/js/tabs.js"></script><script src="/static/js/tooltips.js"></script>
<script>fetch("/alerts/unread-count").then(r=>r.json()).then(d=>{const el=document.getElementById("alert-badge"); if(el){el.textContent=d.unread;}}).catch(()=>{});</script>
</body>
</html>
